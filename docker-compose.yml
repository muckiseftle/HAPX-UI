services:
  hapx-ui:
    build: https://github.com/muckiseftle/HAPX-UI/archive/refs/heads/main.tar.gz
    container_name: hapx-ui
    restart: always
    ports:
      - "80:80"     # HAProxy HTTP
      - "443:443"   # HAProxy HTTPS
      - "8080:8080" # UI Dashboard
    volumes:
      - ./database:/var/www/html/database
      - hapx_certs:/etc/haproxy/certs
      - hapx_config:/etc/haproxy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite

volumes:
  hapx_certs:
  hapx_config:
